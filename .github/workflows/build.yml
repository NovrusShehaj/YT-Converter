name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.build-type }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Debug, Release]

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========================================================================
      # Ubuntu Dependencies
      # ========================================================================
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "================================"
          echo "Installing Ubuntu dependencies"
          echo "================================"
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libboost-all-dev \
            libssl-dev \
            libcpprest-dev \
            ffmpeg \
            python3-pip

          # Install yt-dlp
          pip3 install --user yt-dlp

          echo "================================"
          echo "Dependency versions (Ubuntu):"
          echo "================================"
          cmake --version
          g++ --version
          boost-build --version || true
          openssl version
          ffmpeg -version | head -1
          python3 -m yt_dlp --version

      # ========================================================================
      # macOS Dependencies
      # ========================================================================
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "================================"
          echo "Installing macOS dependencies"
          echo "================================"
          brew update
          brew install cmake boost cpprestsdk openssl ffmpeg yt-dlp

          echo "================================"
          echo "Dependency versions (macOS):"
          echo "================================"
          cmake --version
          clang --version | head -1
          brew list boost | head -3
          openssl version
          ffmpeg -version | head -1
          yt-dlp --version

      # ========================================================================
      # Setup build cache
      # ========================================================================
      - name: Setup build cache (Ubuntu)
        if: runner.os == 'Linux'
        uses: actions/cache@v3
        with:
          path: |
            ~/.ccache
            ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.build-type }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build-type }}-
            ${{ runner.os }}-

      - name: Setup build cache (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v3
        with:
          path: |
            ~/Library/Caches/ccache
            ~/Library/Caches/pip
          key: ${{ runner.os }}-${{ matrix.build-type }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build-type }}-
            ${{ runner.os }}-

      # ========================================================================
      # Configure CMake
      # ========================================================================
      - name: Create build directory
        run: |
          mkdir -p build
          echo "Build directory created: $(pwd)/build"

      - name: Configure CMake
        run: |
          echo "================================"
          echo "Configuring CMake"
          echo "================================"
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DBUILD_TESTS=OFF \
            ..
          echo "================================"
          echo "CMake configuration completed"
          echo "================================"

      # ========================================================================
      # Build
      # ========================================================================
      - name: Build project
        run: |
          echo "================================"
          echo "Building project (${{ matrix.build-type }})"
          echo "================================"
          cd build

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) cmake --build . --verbose
          else
            CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu) cmake --build . --verbose
          fi

          echo "================================"
          echo "Build completed successfully"
          echo "================================"

      # ========================================================================
      # Verify build artifacts
      # ========================================================================
      - name: Verify build artifacts
        run: |
          echo "================================"
          echo "Build artifacts"
          echo "================================"

          # Find and list executables
          if [ -d "build/bin" ]; then
            echo "Executables found in build/bin:"
            ls -lh build/bin/ || echo "No executables"
          fi

          if [ -d "build" ]; then
            echo ""
            echo "All build output files:"
            find build -type f -executable 2>/dev/null | head -20 || echo "No executable files found"
          fi

          echo ""
          echo "CMake cache and configuration:"
          ls -lh build/CMakeCache.txt || echo "CMakeCache.txt not found"

      # ========================================================================
      # Run basic checks
      # ========================================================================
      - name: Check executable integrity
        run: |
          echo "================================"
          echo "Checking executables"
          echo "================================"

          # Check if executables exist and can run --help or --version
          for executable in build/bin/yt2mp3* build/yt2mp3*; do
            if [ -f "$executable" ] && [ -x "$executable" ]; then
              echo "Found executable: $executable"
              file "$executable"
            fi
          done

      - name: Verify dependencies
        run: |
          echo "================================"
          echo "Verifying runtime dependencies"
          echo "================================"

          # Check for required external tools
          echo "Checking ffmpeg..."
          ffmpeg -version | head -1

          echo "Checking yt-dlp..."
          if command -v yt-dlp &> /dev/null; then
            yt-dlp --version
          else
            python3 -m yt_dlp --version
          fi

      # ========================================================================
      # Upload artifacts
      # ========================================================================
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.os }}-${{ matrix.build-type }}
          path: build/
          retention-days: 30

      - name: Upload CMake logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cmake-logs-${{ matrix.os }}-${{ matrix.build-type }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          retention-days: 7

      # ========================================================================
      # Generate summary
      # ========================================================================
      - name: Build summary
        if: always()
        run: |
          echo "================================"
          echo "Build Summary"
          echo "================================"
          echo "Platform: ${{ runner.os }}"
          echo "Build Type: ${{ matrix.build-type }}"
          echo "Status: ${{ job.status }}"
          echo "================================"

  # ============================================================================
  # Final status check
  # ============================================================================
  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds completed successfully"
            exit 0
          else
            echo "❌ Build failed on one or more platforms"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: echo "🎉 All CI checks passed!"

      - name: Notify failure
        if: failure()
        run: echo "⚠️  Some CI checks failed. Please review the logs above."
